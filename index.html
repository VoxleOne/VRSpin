<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRSpin Plaza — WebGL</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0d0d1a; color: #eee; font-family: monospace; }
    canvas { display: block; width: 100vw; height: 100vh; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #hud {
      position: fixed;
      bottom: 16px;
      left: 16px;
      right: 16px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      pointer-events: none;
      max-height: 200px;
      overflow: hidden;
    }
    #instructions {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <canvas></canvas>
  <div id="instructions">
    Drag mouse or use arrow keys / WASD to look around.<br>
    The scene responds to attention — gaze at objects to reveal them.
  </div>
  <div id="hud">Look around to discover the plaza...</div>
  <script type="module" src="src/app/main.js"></script>
</body>
</html>
